<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="g">
      <circle cx="16" cy="16" r="14"/>
    </clipPath>
  </defs>

  <!-- Ocean -->
  <circle cx="16" cy="16" r="14" fill="#1976D2"/>

  <g clip-path="url(#g)" fill="#388E3C">

    <!-- Africa (dominant central mass) -->
    <path d="M12,10 Q15,8 19,10 Q22,12 22,16 Q22,20 19,23 Q17,25 16,25 Q14,25 12,22 Q10,18 10,14 Q10,11 12,10 Z"/>

    <!-- Europe (small blob above Africa, separated by Mediterranean) -->
    <path d="M9,7 Q13,4 17,5 Q20,6 20,9 Q18,11 15,11 Q11,11 9,9 Z"/>

    <!-- Arabia / Horn of Africa -->
    <path d="M21,11 L24,11 L24,15 L22,16 L20,14 Z"/>

    <!-- Scandinavia / northern Europe nub -->
    <path d="M17,4 Q19,3 20,5 Q19,6 18,6 Z"/>

    <!-- Greenland (top left) -->
    <path d="M4,4 Q7,2 10,4 Q10,6 8,7 Q5,7 4,5 Z"/>

    <!-- South America sliver (left edge) -->
    <path d="M2,15 Q4,13 6,16 Q7,20 5,24 Q3,23 2,20 Z"/>

  </g>

  <!-- Globe ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#0D47A1" stroke-width="1"/>
</svg>
